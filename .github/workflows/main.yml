name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: gamer0kayf1n3
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_introduction: yes
          plugin_achievements: no # fine we're disabling it grr
          plugin_achievements_display: compact
          plugin_achievements_only: polyglot, stargazer, sponsor, deployer, member, maintainer, developer, scripter, packager, explorer, infographile # not all for now, screw you github sunset api changes
          plugin_activity_types: PushEvent, PullRequestEvent, IssuesEvent, IssueCommentEvent, CreateEvent # not all for now
          plugin_calendar: yes
          plugin_calendar_limit: 0
          plugin_activity: no # fine we're disabling it grr
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_code: yes
          plugin_code_load: 400
          plugin_code_days: 365
          plugin_code_languages: javascript, typescript, python, html, css, java, astro, cpp
          # removed habits for now
          plugin_isocalendar: yes
          plugin_languages: yes # i will cry if i have to disavle this too
          plugin_languages_ignored: >-
            tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size
          plugin_languages_limit: 4
          plugin_languages_analysis_timeout: 15
          plugin_stars: yes
          plugin_stars_limit: 3
          plugin_traffic: yes
          plugin_leetcode: yes
          plugin_leetcode_sections: solved, skills, recent
          config_timezone: Asia/Manila
